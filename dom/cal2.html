<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <center>
    <h1>simple calculator</h1>
    <div>
        <input type="text" id="num1" placceholder="">
    </div>
    <div>
        <button id="1"  class="one">1</button>
        <button id="2"  class="one">2</button>
        <button id="3"  class="one">3</button><br>
        <button id="4"  class="one">4</button>
        <button id="5"  class="one">5</button>
        <button id="6"  class="one">6</button><br>
        <button id="7"  class="one">7</button>
        <button id="8"  class="one">8</button>
        <button id="9"  class="one">9</button>
        
    </div>
    <div>
        <button id="add" class="oper">+</button>
        <button id="sub" class="oper">-</button>
        <button id="mul" class="oper">*</button><br>
        <button id="div" class="oper">/</button>
        <button id="clr" class="oper">clr</button><br>
        <button id="back"class="oper">back</button>
        <button id="equal" class="oper">=</button>

    </div>
    </center>
    <script>
        const input = document.getElementById('num1');
         for( let i=1;i<=9;i++){
            document.getElementById(i.toString()).addEventListener("click", ()=>{
                input.value +=i;

            })
        }
        document.getElementById("add").addEventListener("click", () => input.value += "+");
        document.getElementById("sub").addEventListener("click", () => input.value += "-");
        document.getElementById("mul").addEventListener("click", () => input.value += "*");
        document.getElementById("div").addEventListener("click", () => input.value += "/");
        document.getElementById("clr").addEventListener("click", () => input.value += "");
        document.getElementById("back").addEventListener("click",()=>{ input.value = input.value.slice(0,-1); })
        document.getElementById("equal").addEventListener("click", () => {
            try {
                input.value = eval(input.value)
            }
            catch (e) {
                input.value = "Error";
            }
        });
    </script>
</body>
</html>
