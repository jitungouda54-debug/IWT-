<!-- create three buttons red, green and blue. when a button is clicked ,change the background color of<div> accordinly. before changing the color ask confirmtion from the user if they relly want to change the color
-->
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            #colorBox {
                width: 500px;
                height: 600px;
                border: 1px solid #000;
                margin-top: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        </style>
    </head>
    <body>
        <h2>Change Background Color</h2>
        
        <button onclick="changeColor('red')">Red</button>
        <button onclick="changeColor('green')">Green</button>
        <button onclick="changeColor('blue')">Blue</button>
        <div id="colorBox">color box</div>
        <script>
            function changeColor(color) {
                const confirmChange = confirm(`Do you really want to change the background color to ${color}?`);
                if (confirmChange) {
                    const colorBox = document.getElementById('colorBox');
                    colorBox.style.backgroundColor = color;
                }
            }
        </script>
    </body>
    </html>
