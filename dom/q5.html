<!-- design a form to take number as input and ,with the help of  js , check  if the number is prime or not .display the messege in alert box-->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <h2>Prime Number Checker</h2>
    <form id="primeForm">
        <label for="numberInput">Enter a number:</label>
        <input type="number" id="numberInput" required>
        <button type="submit">Check</button>
        </form>
    <script>
        function isPrime(num) {
            if (num <= 1) return false;
            for (let i = 2; i <= Math.sqrt(num); i++) {
                if (num % i === 0) return false;
            }
            return true;
        }
        document.getElementById('primeForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const number = parseInt(document.getElementById('numberInput').value);
            if (isPrime(number)) {
                alert(`${number} is a prime number.`);
            } else {
                alert(`${number} is not a prime number.`);
            }
        });
    </script>
 </body>
 </html>
