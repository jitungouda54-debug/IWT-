<html>
    <body>
        <h2>Employee Form</h2>
        <form>
            Employee Id:<input type="text" name="Id"><br><br>
            Name:<input type="text" name="name"><br><br>
            Mobile:<input type="text" name="mobile"><br><br>
            Email:<input type="email" name="email"><br><br>

            gender:
            <input type="radio" name="gender" value="male">male
            <input type="radio" name="female" value="female">female<br><br>

            Date of Birth:<input type="date" name="dob"><br><br>

            Adress:<br>
            <textarea name="adress"></textarea><br><br>

            country:
            <select name="country">
                <option>India</option>
                <option>other</option>
            </select><br><br>

            languages Known:
            <input type:"checkbox" name="lang" value="English">English
            <input type:"checkbox" name="lang" value="Hindi">Hindi
            <input type:"checkbox" name="lang" value="Odia">Odia 
            <input type:"checkbox" name="lang" value="spanish">spanish<br><br>
            <input type="submit" value="submit">


        </form>
    </body>
</html>
