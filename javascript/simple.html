<!-- simple interest -->
<html>
    <head>

        <script>
        let p=parseFloat(prompt("Enter the principal amount"));
        let r=parseFloat(prompt("Enter the rate of interest"));
        let t=parseFloat(prompt("Enter the time in years"));

        let si=(p*r*t)/100;
        document.write("The simple interest is: "+si);
 
        </script>
    </head>
 </html>
