<!-- grade system -->
 <html>
    <body>
        <script>
            let m = parseInt(prompt("Enter your marks:"));
            if(m>=90){
                document.write("Grade A");
            }
            else if(m>=75){
                document.write("Grade B");
            }
            else if(m>=60){
                document.write("Grade C");
            }
            else{
                document.write("Grade fail");
            }
        </script>
    </body>
 </html>
