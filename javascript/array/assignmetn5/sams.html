<!-- calculate and print sum,average,largest -->
     <html>
        <body>
            <script>
                var a = new Array(5,43,54,21,32);
                var sum = 0;
                for(var i=0; i<a.length; i++){
                    sum += a[i];
                    
                }
                var average = sum / a.length;

                document.write("Sum: " + sum + "<br>");
                document.write("Average: " + average + "<br>");
                document.write("Largest: " + Math.max(...a)+ "<br>");
                document.write("Smallest: " + Math.min(...a));
            </script>
        </body>
     </html>
