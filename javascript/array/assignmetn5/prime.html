<!-- wa function isprime(num)vthat return true if the number is prime, false otherwise -->
 <html>
    <body>
        <script>
            function isPrime(num){
                if(num <= 1){
                    return false;
                }
                for(let i=2; i<=Math.sqrt(num); i++){
                    if(num % i === 0){
                        return false;
                    }
                }
                return true;

            }
            </script>
            
    </body>
 </html>
