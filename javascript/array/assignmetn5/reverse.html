<!-- write a function reverse  Array(arr) that reverse the lement of an array without using built in function in reverse method -->
 <html>
    <body>
        <script>
            function reverseArray(arr){
                let reversed = [];
                for(let i=arr.length-1; i>=0; i--){
                    reversed.push(arr[i]);
                }
                return reversed;
            }
            var a = new Array(1,2,3,4,5);
            var reversedArray = reverseArray(a);
            document.write("Original array: " + a + "<br>");
            document.write("Reversed array: " + reversedArray);
            </script>
            
 </html>
