<!-- factorial of anumber -->
 <hntml>
    <body>
        <script>
            function fact(n){
                var f=1;
                while(n!=0){
                    f=f*n;
                    n--;
                }
                return f;
            }
            let x = parseInt(prompt("Enter a number"));
            let y = fact(x);
            document.write("Factorial is: " + y);
        </script>
    </body>
 </hntml>
