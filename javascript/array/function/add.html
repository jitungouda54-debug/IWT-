<!-- addition of function -->
 <html>
    <body>
        <script>
            function add(a,b){
                return a+b;
            }
            let x = parseInt(prompt("Enter a number"));
            let y = parseInt(prompt("Enter another number"));
            let z = add(x,y);
            document.write("Sum is: " + z);
            </script>
 </html>
