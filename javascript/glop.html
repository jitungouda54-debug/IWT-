<!-- Write a program to input three integer number and find the greatest one using nested if -->
 <html>
    <head>
        <script>
            let a = parseInt(prompt("Enter the first number"));
            let b = parseInt(prompt("Enter the second number"));
            let c = parseInt(prompt("Enter the third number"));
            if(a>b){
                if(a>c){
                    document.write("The greatest number is: "+a);
                }
                else{
                    document.write("The greatest number is: "+c);
                }
            }
            else{
                if(b>c){
                    document.write("The greatest number is: "+b);
                }
                else{
                    document.write("The greatest number is: "+c);
                }
            }
        </script>
        </head>
        </html>
