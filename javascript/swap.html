<html>
    <head>

        <script>
            let a= parseInt(prompt("Enter the first number"));
            let b= parseInt(prompt("Enter the second number"));
            a=a+b;
            b=a-b;
            a=a-b;
            document.write("The first number is now: "+a+"<br>The second number is now: "+b);
 
        </script>
    </head>
 </html>
