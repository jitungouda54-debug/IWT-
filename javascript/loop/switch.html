<!-- check whether the character is vowel or consonant using switch -->
 <html>
    <head>
        <script>
            let char = prompt("Enter a character:");
            switch(char.toLowerCase()) {
                case 'a':
                case 'e':
                case 'i':
                case 'o':
                case 'u':
                    document.write(char + " is a vowel.");
                    break;
                default:
                    document.write(char + " is a consonant.");
            }
        </script>
    </head>
 </html>
