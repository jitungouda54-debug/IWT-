<!-- check the number is prime or not  using loop -->
 <html>
    <head>
        <script>
           var i =1,n = 7,c=0;
             while(i<=n){
                if(n%i==0)
                    c++;
                i++;
                }
                if(c==2)
                document.write("The number is prime");
                else
                document.write("The number is not prime"); 
        </script>
    </head>
 </html>
