<!-- input a number and reverse the number using do while loop -->

<html>
    <head>
        <script>
            let num = parseInt(prompt("Enter a number"));
            let rev = 0, rem;
            do {
                rem = num % 10;
                rev = rev * 10 + rem;
                num = Math.floor(num / 10);
            } while (num != 0);
            document.write("The reverse of the number is: " + rev);
            
            
        </script>
    </head>
</html>
