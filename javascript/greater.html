    <head>

        <script>
        let a = parseInt(prompt("Enter a number"));
        let b = parseInt(prompt("enter teh second number"));
        
         a > b ? document.write("The greater number is: "+a) : document.write("The greater number is: "+b);
        </script>
    </head>
    <body></body>
 </html>
